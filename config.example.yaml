## Use this file for setting behavior/tuning overrides.
## Copy and rename file to config.yaml at the repo root.
## All settings present in this file will override
## the default settings in  ripple1d_pipeline/default_config.yaml.
## This file is gitignored.

## Shared tuning values live in `ripple_settings`. Payload templates reference them
## as {NAME} (e.g. resolution: "{RESOLUTION}"), so to change resolution, a depth
## increment, the RAS version, etc. everywhere they are used, override the value in
## `ripple_settings` below -- you do NOT need to touch any payload_template.

## Override a payload_template leaf only for a per-step value that is not in
## ripple_settings. For deeply nested keys, uncomment only the lines you want to edit.
## For example, to modify just max_flow_multiplier_ras:
## processing_steps:
##   extract_submodel:
##     payload_template:
##       max_flow_multiplier_ras: 1.5   # overrides just this leaf

